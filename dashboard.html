<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2K Bot - Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --msg-user: #1e293b;
            --msg-bot: #2563eb;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
        }
        /* Layout */
        .sidebar {
            width: 350px;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .header {
            padding: 24px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .client-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .client-item {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .client-item:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(4px);
        }
        .client-item.active {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .client-phone { font-weight: 600; font-size: 1.1rem; margin-bottom: 6px; display:flex; align-items: center; gap:8px;}
        .client-preview { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Chat View */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.5);
            position: relative;
        }
        .chat-header {
            padding: 24px;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 5;
        }
        .chat-header h2 { margin: 0; font-size: 1.3rem; font-weight: 600; }
        
        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-muted);
            animation: fadeIn 1s ease-out;
        }
        .empty-state h3 { font-size: 1.8rem; margin-bottom: 12px; color: var(--text-main); }
        .empty-state p { font-size: 1.1rem; max-width: 400px; line-height: 1.5;}
        
        .msg-bubble {
            max-width: 65%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            animation: slideIn 0.3s ease-out forwards;
        }
        .msg-user {
            align-self: flex-end;
            background: var(--msg-user);
            border: 1px solid var(--border-glass);
            border-bottom-right-radius: 4px;
        }
        .msg-bot {
            align-self: flex-start;
            background: var(--msg-bot);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .msg-time {
            display: block;
            font-size: 0.75rem;
            margin-top: 8px;
            opacity: 0.6;
            text-align: right;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        
        /* Bouton Export */
        .btn-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-success:hover {
            background: rgba(16, 185, 129, 0.3);
            transform: scale(1.02);
        }
        
        /* Search & Filters */
        .search-container { padding: 12px; border-bottom: 1px solid var(--border-glass); }
        .search-container input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.25); color: white; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border 0.3s; }
        .search-container input:focus { border-color: var(--accent); }
        
        .filters { display: flex; gap: 8px; padding: 12px; border-bottom: 1px solid var(--border-glass); overflow-x: auto; }
        .filter-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: var(--text-muted); padding: 8px 6px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .filter-btn:hover { background: rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Tags */
        .tag { font-size: 0.7rem; padding: 3px 6px; border-radius: 4px; margin-left: auto; font-weight: bold; }
        .tag-hot { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .tag-human { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); }
        .tag-simple { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }
        
        /* Input Area (Supervisor Mode) */
        .chat-input-area { padding: 20px; background: var(--bg-panel); border-top: 1px solid var(--border-glass); display: flex; gap: 12px; align-items: center; z-index: 5; }
        .chat-input-area input { flex: 1; padding: 14px 20px; border-radius: 20px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.25); color: white; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .chat-input-area input:focus { border-color: var(--accent); }
        .btn-send { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'Inter'; font-size: 1rem; transition: background 0.2s; }
        .btn-send:hover { background: #2563eb; }
        .btn-pause-ai { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); padding: 12px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'Inter'; white-space: nowrap; transition: all 0.2s; }
        .btn-pause-ai.paused { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">
            <span style="font-size: 28px;">🤖</span>
            <h1 style="flex:1;">A2K Dashboard</h1>
            <a href="/export" class="btn-success" title="Exporter tous les numéros en CSV">📥 CSV</a>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Rechercher un numéro ou message...">
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
            <button class="filter-btn" onclick="setFilter('hot', this)">🔥 Chaud</button>
            <button class="filter-btn" onclick="setFilter('human', this)">🙋‍♂️ Humain</button>
            <button class="filter-btn" onclick="setFilter('simple', this)">💬 Simple</button>
        </div>
        <div class="client-list" id="client-list">
            <!-- Liste injectée via JS -->
        </div>
    </div>
    
    <div class="chat-view">
        <div class="chat-header" id="chat-header" style="display:none;">
            <span style="font-size: 26px;">📱</span>
            <h2 id="chat-title" style="flex:1;">Client</h2>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="empty-state">
                <span style="font-size: 64px; display:block; margin-bottom:20px;">📉</span>
                <h3>Centre de Contrôle</h3>
                <p>Sélectionnez une conversation dans le menu de gauche pour superviser Max ou prendre le relais en direct.</p>
            </div>
        </div>
        <div class="chat-input-area" id="chat-input-area" style="display:none;">
            <button id="btn-toggle-ai" class="btn-pause-ai" onclick="toggleAI()">⏸️ Désactiver IA</button>
            <input type="text" id="manual-input" placeholder="Écrire un message en tant qu'humain (prend le relais)..." onkeypress="if(event.key === 'Enter') sendManualMessage()">
            <button class="btn-send" onclick="sendManualMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        // Les données seront injectées ici par Python
        const data = __DATA_JSON__;
        
        const clientList = document.getElementById('client-list');
        const chatMessages = document.getElementById('chat-messages');
        const chatHeader = document.getElementById('chat-header');
        const chatTitle = document.getElementById('chat-title');
        
        let currentPhone = null;
        let currentFilter = 'all';
        let searchQuery = '';
        
        function setFilter(filter, btnElement) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderClientList();
        }
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderClientList();
        });
        
        function loadChat(phone) {
            currentPhone = phone;
            
            // Update UI active state
            document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('client-' + phone);
            if(activeEl) activeEl.classList.add('active');
            
            // Render header
            chatHeader.style.display = 'flex';
            chatTitle.textContent = '+' + phone;
            document.getElementById('chat-input-area').style.display = 'flex';
            
            // Render Pause button state
            const btnAI = document.getElementById('btn-toggle-ai');
            if(data[phone].ai_paused) {
                btnAI.classList.add('paused');
                btnAI.innerHTML = '▶️ Réactiver IA';
            } else {
                btnAI.classList.remove('paused');
                btnAI.innerHTML = '⏸️ Désactiver IA';
            }
            
            // Render messages
            chatMessages.innerHTML = '';
            const msgs = data[phone].messages;
            msgs.slice().reverse().forEach((msg, index) => {
                const isUser = msg.role === 'user';
                const div = document.createElement('div');
                div.className = 'msg-bubble ' + (isUser ? 'msg-user' : 'msg-bot');
                div.style.animationDelay = (index * 0.05) + 's';
                
                // Cacher les tags techniques de l'interface
                let cleanContent = msg.content
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\[ALERTE_PROSPECT\]/g, '')
                    .replace(/\[ALERTE_HUMAIN\]/g, '')
                    .replace(/\n/g, '<br/>');
                
                div.innerHTML = `
                    ${cleanContent}
                    <span class="msg-time">${msg.timestamp}</span>
                `;
                chatMessages.appendChild(div);
            });
            // Scroll to bottom after a small delay to allow rendering
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 50);
        }

        function renderClientList() {
            clientList.innerHTML = '';
            let count = 0;
            
            if(Object.keys(data).length === 0) {
                clientList.innerHTML = '<p style="text-align:center;color:var(--text-muted);margin-top:40px;">Aucune base de données.</p>';
                return;
            }

            for (const phone in data) {
                const msgs = data[phone].messages;
                const lastMsg = msgs[0]; // Le plus récent
                const ai_paused = data[phone].ai_paused;
                
                // Déterminer le statut du client basé sur l'historique complet
                let status = 'simple';
                let allText = '';
                
                for(let m of msgs) {
                    allText += m.content.toLowerCase() + ' ';
                    if (m.content.includes('[ALERTE_PROSPECT]')) {
                        status = 'hot';
                        break; // Hot est le statut maximum
                    }
                    if (m.content.includes('[ALERTE_HUMAIN]') || m.content.toLowerCase().includes('prendre le relais')) {
                        status = 'human';
                    }
                }
                
                // Application des Filtres
                if(currentFilter !== 'all' && status !== currentFilter) continue;
                if(searchQuery && !phone.includes(searchQuery) && !allText.includes(searchQuery)) continue;
                
                count++;
                
                // HTML du Tag
                let tagHtml = '<span class="tag tag-simple">💬 Simple</span>';
                if(status === 'hot') tagHtml = '<span class="tag tag-hot">🔥 Chaud</span>';
                if(status === 'human') tagHtml = '<span class="tag tag-human">🙋‍♂️ Humain</span>';

                const div = document.createElement('div');
                div.className = 'client-item' + (currentPhone === phone ? ' active' : '');
                div.id = 'client-' + phone;
                div.onclick = () => loadChat(phone);
                
                // Aperçu sans les tags
                const previewText = lastMsg.content.replace(/</g, '&lt;').replace(/\[.*?\]/g, '').substring(0, 35) + '...';
                
                div.innerHTML = `
                    <div class="client-phone">📱 +${phone} ${tagHtml}</div>
                    <div class="client-preview">${lastMsg.role === 'assistant' ? '🤖' : '👤'} ${previewText}</div>
                `;
                clientList.appendChild(div);
            }
            
            if(count === 0) {
                clientList.innerHTML = '<p style="text-align:center;color:var(--text-muted);margin-top:20px;">Aucun résultat.</p>';
            }
        }
        
        async function toggleAI() {
            if(!currentPhone) return;
            try {
                const res = await fetch('/toggle_ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone: currentPhone})
                });
                const result = await res.json();
                if(result.success) {
                    data[currentPhone].ai_paused = result.ai_paused;
                    loadChat(currentPhone); // Refresh le bouton
                }
            } catch(e) {
                console.error("Erreur toggle IA", e);
            }
        }

        async function sendManualMessage() {
            if(!currentPhone) return;
            const input = document.getElementById('manual-input');
            const msg = input.value.trim();
            if(!msg) return;
            
            // Vider l'input et ajouter le message temp pour réactivité
            input.value = '';
            const div = document.createElement('div');
            div.className = 'msg-bubble msg-bot';
            div.style.background = '#0ea5e9'; // Une couleur un peu différente pour le manuel
            div.innerHTML = msg.replace(/\n/g, '<br/>') + '<span class="msg-time">À l\'instant (Toi)</span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Désactiver l'IA automatiquement si on prend le relais
            if(!data[currentPhone].ai_paused) {
                await toggleAI();
            }

            try {
                await fetch('/send_manual', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone: currentPhone, message: msg})
                });
                // Idéalement on rechargerait la page pour avoir le vrai timestamp de la DB, 
                // mais la DB le fait en arrière plan.
            } catch(e) {
                console.error("Erreur envoi manuel", e);
            }
        }
        
        // Initial Render
        renderClientList();
    </script>
</body>
</html>
