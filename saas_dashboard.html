<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Orchestrator - MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #3b82f6; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-family: 'Inter'; }
        input:focus, textarea:focus { border-color: #3b82f6; outline: none; }
        textarea { height: 100px; resize: vertical; }
        button { margin-top: 25px; width: 100%; padding: 14px; border-radius: 8px; background: #3b82f6; color: white; font-weight: bold; font-size: 1rem; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Usine à Bots WhatsApp</h1>
        <p class="subtitle">Création d'un nouveau client (Phase 1 MVP)</p>

        <form action="/create" method="POST">
            <label>ID Client (minuscules, sans espaces) :</label>
            <input type="text" name="client_id" placeholder="ex: boulangerie_paul" required>

            <label>Nom de l'entreprise :</label>
            <input type="text" name="business_name" placeholder="ex: Boulangerie Paul Dakar" required>

            <label>Numéro WhatsApp de l'Admin (sans le +) :</label>
            <input type="text" name="admin_phone" placeholder="ex: 221770000000" required>

            <label>Green API - ID Instance :</label>
            <input type="text" name="wa_id_instance" placeholder="ex: 7103847592" required>

            <label>Green API - Token :</label>
            <input type="text" name="wa_api_token" placeholder="ex: f98a7b6c..." required>

            <label>Port d'écoute (Doit être unique pour chaque client !) :</label>
            <input type="number" name="port" value="8081" required>

            <label>Description (Infos de base pour l'IA) :</label>
            <textarea name="business_info" placeholder="Décrivez l'entreprise, le ton du bot, etc." required></textarea>

            <button type="submit">🪄 Déployer le Bot</button>
        </form>
    </div>
</body>
</html>
